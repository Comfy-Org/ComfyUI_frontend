<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ComfyUI</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link rel="stylesheet" type="text/css" href="materialdesignicons.min.css" />

    <!-- Fullscreen mode on mobile browsers -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Status bar style (eg. black or transparent) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <style>
      @media (prefers-color-scheme: dark) {
        body {
          /* Setting it early for background during load */
          --bg-color: #202020;
          --fg-color: #ffffff;
        }
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }
      body {
        display: grid;
        background-color: var(--bg-color);
        background-image: var(--bg-img);
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip-path: inset(50%);
        white-space: nowrap;
        border: 0;
      }
      /* Pre-Vue splash loader — colors set by inline script */
      #splash-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #splash-loader svg {
        width: min(74px, 12vw);
        height: auto;
      }
      #splash-loader .c-fill-rect {
        animation: c-fill-right 1s cubic-bezier(0.25, 0, 0.3, 1) 0.75s both;
        will-change: transform;
      }
      @keyframes c-fill-right {
        0% {
          transform: translateX(-186px);
        }
        100% {
          transform: translateX(-1px);
        }
      }
      #splash-loader .bar-track {
        position: relative;
        width: min(185px, 30vw);
        height: min(10px, 1.2vw);
        margin-top: min(24px, 3vw);
        border-radius: 9999px;
        overflow: hidden;
      }
      #splash-loader .bar-bg {
        position: absolute;
        inset: 0;
        background: currentColor;
        opacity: 0.2;
        border-radius: 9999px;
      }
      #splash-loader .bar-fill {
        position: absolute;
        inset: 0;
        background: currentColor;
        border-radius: 9999px;
        transform-origin: left;
        animation: bar-fill-right 2.5s cubic-bezier(0.25, 0, 0.3, 1) forwards;
      }
      @keyframes bar-fill-right {
        0% {
          transform: scaleX(0);
        }
        100% {
          transform: scaleX(1);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash-loader .c-fill-rect,
        #splash-loader .bar-fill {
          animation: none;
        }
      }
    </style>
    <link rel="manifest" href="manifest.json" />
  </head>

        <g mask="url(#c-mask-splash)">
          <rect
            class="c-fill-rect"
            x="-1"
            y="-1"

            height="203"
            fill="currentColor"

      </svg>
      <div class="bar-track">
        <div class="bar-bg"></div>
        <div class="bar-fill"></div>
      </div>
    </div>
    <script>
      ;(function () {
        var hint
        try {
          hint = localStorage.getItem('comfy-theme-hint')
        } catch (_) {
          hint = null
        }
        var isDark = hint !== 'light'
        var bg = isDark ? '#202020' : '#f5f5f5'
        var fg = isDark ? '#ffffff' : '#000000'
        var el = document.getElementById('splash-loader')
        if (el) {
          el.style.background = bg
          el.style.color = fg
        }
        document.body.style.setProperty('--bg-color', bg)
        document.body.style.setProperty('--fg-color', fg)
      })()
    </script>
    <div id="vue-app"></div>
    <script type="module" src="src/main.ts"></script>
  </body>
</html>
