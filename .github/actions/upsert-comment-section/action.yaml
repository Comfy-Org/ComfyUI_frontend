name: Upsert Comment Section
description: >
  Manage a consolidated PR comment with independently-updatable sections.
  Multiple CI workflows can share the same comment by using the same
  comment-marker and different section-names. Each workflow upserts only
  its own section, leaving other sections intact.

inputs:
  pr-number:
    description: PR number to comment on
    required: true
  section-name:
    description: 'Section identifier (e.g. "playwright", "storybook", "e2e", "preview")'
    required: true
  section-content:
    description: Markdown content for this section
    required: true
  comment-marker:
    description: Top-level HTML comment marker shared by all sections in this comment
    required: true
  token:
    description: GitHub token with pull-requests write permission
    required: true

runs:
  using: composite
  steps:
    - uses: actions/github-script@v8
      env:
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        INPUT_SECTION_NAME: ${{ inputs.section-name }}
        INPUT_SECTION_CONTENT: ${{ inputs.section-content }}
        INPUT_COMMENT_MARKER: ${{ inputs.comment-marker }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          const prNumber = Number(process.env.INPUT_PR_NUMBER)
          const sectionName = process.env.INPUT_SECTION_NAME
          const sectionContent = process.env.INPUT_SECTION_CONTENT
          const commentMarker = process.env.INPUT_COMMENT_MARKER

          if (!/^[a-z0-9-]+$/.test(sectionName)) {
            throw new Error(`Invalid section-name: ${sectionName}`)
          }

          const sectionStart = `<!-- section:${sectionName}:start -->`
          const sectionEnd = `<!-- section:${sectionName}:end -->`
          const sectionBlock = `${sectionStart}\n${sectionContent}\n${sectionEnd}`

          // Escape special regex characters in delimiter strings
          const escapeRegex = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
          const sectionRegex = new RegExp(
            `${escapeRegex(sectionStart)}[\\s\\S]*?${escapeRegex(sectionEnd)}`
          )

          // Every section-start marker in a body, used to detect whether a
          // concurrent writer's section was lost across our write.
          const sectionStartsIn = (body) =>
            body.match(/<!-- section:[a-z0-9-]+:start -->/g) ?? []

          const findComment = async () => {
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { ...context.repo, issue_number: prNumber }
            )
            return comments.find(
              (c) =>
                c.user?.login === 'github-actions[bot]' &&
                c.body?.includes(commentMarker)
            )
          }

          // Several workflows share one comment via read-modify-write, which the
          // REST API can't do atomically. Re-read immediately before each write
          // and verify our section plus every previously-present section
          // survived; on a detected clobber, re-read and retry so writers
          // converge instead of silently dropping each other's sections.
          const maxAttempts = 5
          for (let attempt = 1; attempt <= maxAttempts; attempt++) {
            const existing = await findComment()

            if (!existing) {
              try {
                const created = await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: prNumber,
                  body: `${commentMarker}\n${sectionBlock}`
                })
                // Concurrent writers may have also created a comment; deduplicate
                // by keeping the lowest-id copy and deleting the rest.
                const allComments = await github.paginate(
                  github.rest.issues.listComments,
                  { ...context.repo, issue_number: prNumber }
                )
                const duplicates = allComments.filter(
                  (c) =>
                    c.user?.login === 'github-actions[bot]' &&
                    c.body?.includes(commentMarker) &&
                    c.id !== created.data.id
                )
                for (const dup of duplicates) {
                  try {
                    await github.rest.issues.deleteComment({
                      ...context.repo,
                      comment_id: dup.id
                    })
                  } catch (_) {}
                }
                return
              } catch (err) {
                if (attempt === maxAttempts) throw err
                continue // another writer likely created it first; retry updates
              }
            }

            const body = existing.body ?? ''
            const expectedSections = sectionStartsIn(body)
            const updated = sectionRegex.test(body)
              ? body.replace(sectionRegex, sectionBlock)
              : body.trimEnd() + '\n\n' + sectionBlock

            await github.rest.issues.updateComment({
              ...context.repo,
              comment_id: existing.id,
              body: updated
            })

            const current = (await findComment())?.body ?? ''
            const survived =
              current.includes(sectionBlock) &&
              expectedSections.every((s) => current.includes(s))
            if (survived) return

            if (attempt === maxAttempts) {
              core.warning(
                `upsert-comment-section: section "${sectionName}" may have been clobbered by a concurrent writer after ${maxAttempts} attempts`
              )
              return
            }
            await new Promise((resolve) =>
              setTimeout(resolve, 250 * attempt + Math.floor(Math.random() * 250))
            )
          }
