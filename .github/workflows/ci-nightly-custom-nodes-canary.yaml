# Nightly drift radar for the custom-node suite - NON-GATING by design. The
# PR gate (ci-tests-custom-nodes.yaml) pins core and packs at the git level,
# so no git surface moves underneath a PR; this workflow is where git-level
# drift surfaces instead, one moving git variable per job so every red names
# its own culprit. (Python deps and the runner image still resolve fresh in
# every job, gate and canary alike - a red that appears everywhere at once
# right after a dependency release is environment, not drift.)
#
#   Job A (canary-core-drift): core at master, packs pinned
#     -> red = a core change broke the frontend contract or exposed a pack
#        bug (e.g. the 2026-07-18 KJNodes editor crashes). Fix our code,
#        ledger the pack bug, or bump the gate's core pin in its own PR.
#   Job B (canary-pack-drift): core pinned (same SHA as the gate), packs at
#     their default-branch HEAD -> red = the authors' latest diverges from
#     what we verified. The suite runs UNMODIFIED and fully strict on
#     purpose: CI cannot classify an author's intent (an added node, a
#     removed node, and a rename can each be healthy or breakage), so Job B
#     only DETECTS divergence and a human classifies from the report.
#     Expect red to be the steady state whenever our pins lag the authors -
#     it is a stale-pins pressure gauge driving deliberate pin bumps, not a
#     fire alarm. The manifest's pin fields stay untouched and still
#     validate; this job's install step simply does not use them.
#
# A canary red blocks nothing; it is a signal to triage. Both jobs mirror
# the gate's steps minus the path filter (drift checks always run the full
# suite); each job moves exactly ONE git-level variable.
name: 'CI: Custom Nodes Canary'

on:
  schedule:
    # Nightly, off-peak. Scheduled runs execute from the default branch.
    - cron: '30 8 * * *'
  workflow_dispatch:

# Two overlapping failing runs could both pass the filing step's issue-list
# check before either creates, double-filing past the dedup. Queue instead;
# never cancel a drift run mid-flight.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  canary-core-drift:
    # Don't run the cron on forks.
    if: github.repository == 'Comfy-Org/ComfyUI_frontend'
    runs-on: ubuntu-latest
    # Drift reds run slower than green (retries multiply every failure); the
    # historical all-broken run needed ~90 minutes. The suite STEP carries its
    # own lower timeout so an overrun FAILS the step (failure() stays true,
    # the report uploads, the issue files); this job ceiling is headroom only
    # - a job-level timeout CANCELS, and cancelled steps skip failure() gates.
    # 100, not 90: setup (pip/torch installs) runs before the 75-min suite
    # step, and a slow setup day must not let the job cancel beat the step
    # timeout.
    timeout-minutes: 100
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup frontend
        uses: ./.github/actions/setup-frontend
        with:
          include_build_step: true

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      # No comfyui_ref: core deliberately floats at master. This is the ONE
      # moving variable in this job.
      - name: Setup ComfyUI server
        uses: ./.github/actions/setup-comfyui-server
        with:
          launch_server: 'false'

      # Identical pinned-pack install to the gate: packs must NOT move here,
      # or a red would be ambiguous between core drift and pack drift.
      - name: Install manifest custom nodes
        shell: bash
        run: |
          set -euo pipefail
          pip freeze | grep -iE '^(torch|torchvision|torchaudio)==' \
            > /tmp/torch-constraints.txt || true
          manifest=browser_tests/fixtures/data/customNodeManifest.json
          mapfile -t entries < <(jq -c '.[]' "$manifest")
          for entry in "${entries[@]}"; do
            repo=$(jq -r '.repo' <<<"$entry")
            pin=$(jq -r '.pin' <<<"$entry")
            pack=$(jq -r '.pack' <<<"$entry")
            if ! [[ "$pack" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
              echo "::error::unsafe pack name: '$pack'"; exit 1
            fi
            if ! [[ "$pin" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::$pack: pin must be a full commit SHA (got '$pin')"; exit 1
            fi
            dir="ComfyUI/custom_nodes/$pack"
            echo "::group::install $pack"
            git clone --depth 1 "$repo" "$dir"
            git -C "$dir" fetch --depth 1 origin "$pin"
            git -C "$dir" checkout "$pin"
            if [ -f "$dir/requirements.txt" ]; then
              pip install -r "$dir/requirements.txt" -c /tmp/torch-constraints.txt
            fi
            echo "::endgroup::"
          done

      - name: Stage run-tier assets
        shell: bash
        run: cp browser_tests/assets/plain_video.mp4 ComfyUI/input/plain_video.mp4

      - name: Start ComfyUI server
        shell: bash
        working-directory: ComfyUI
        run: |
          python main.py --cpu --multi-user --cache-none --front-end-root ../dist &
          wait-for-it --service 127.0.0.1:8188 -t 600

      - name: Run custom-node suite
        # Step timeout below the job ceiling: an overlong run fails HERE
        # (keeping failure() true for the filing step) instead of tripping
        # the job-level cancel.
        timeout-minutes: 75
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: custom-nodes-results.json
        run: |
          pnpm exec playwright test browser_tests/tests/customNodes/ \
            --project=custom-nodes --reporter=list,json,html --workers=1

      - name: Forbid skipped tests
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          skipped=$(jq '.stats.skipped' custom-nodes-results.json)
          echo "skipped tests: $skipped"
          if [ "$skipped" != "0" ]; then
            echo "::error::$skipped test(s) skipped - a manifest pack or devtools failed to load on current core"
            jq -r '.. | objects
                     | select(has("title") and has("tests"))
                     | select(any(.tests[]?; .status == "skipped"))
                     | .title' custom-nodes-results.json | sort -u | head -40
            exit 1
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-custom-nodes-canary
          path: playwright-report/
          retention-days: 7
          if-no-files-found: warn

      # The radar must page someone: a red files (or updates) ONE tracked
      # issue, deduped on the label, so nightly reds never rot unseen in the
      # Actions tab and never spam a new issue per night. cancelled() is
      # included so an infra-cancelled red still pages instead of vanishing.
      # gh issue create fails on a missing label: both canary labels exist
      # in this repo (create them once if porting this workflow elsewhere).
      - name: File drift issue on failure
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body="Nightly custom-nodes canary (core at master, packs pinned) went red or was cancelled mid-run: $run_url
          Triage: core drift broke the frontend contract, or exposed a pack bug. A geometry delta under the mount test title means core moved node layout - drift signal, not a mount break. Playbook in ci-nightly-custom-nodes-canary.yaml; ledger/pin/count mechanics in browser_tests/tests/customNodes/ADDING_CUSTOM_NODES.md. Failure detail: download the playwright-report-custom-nodes-canary artifact from the run."
          existing=$(gh issue list --repo "${{ github.repository }}" \
            --label custom-nodes-canary --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "$body"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "Custom-nodes canary: core drift" \
              --label custom-nodes-canary \
              --body "$body"
          fi

  canary-pack-drift:
    # Job B: the ONE moving git variable is the packs (default-branch HEAD);
    # core stays at the gate's exact pin. Don't run the cron on forks.
    if: github.repository == 'Comfy-Org/ComfyUI_frontend'
    runs-on: ubuntu-latest
    # 100/75 split for the same reason as Job A: red is this job's expected
    # steady state, and the report must survive it.
    timeout-minutes: 100
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup frontend
        uses: ./.github/actions/setup-frontend
        with:
          include_build_step: true

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      # Same pin as the gate (ci-tests-custom-nodes.yaml) - keep them in
      # sync when bumping, or this job's reds stop isolating pack drift.
      - name: Setup ComfyUI server
        uses: ./.github/actions/setup-comfyui-server
        with:
          launch_server: 'false'
          comfyui_ref: 'b08e6cf35fac50d3ca8470dffb3f9a1fbb7187d2'

      # Install every manifest pack at its default-branch HEAD. The pin
      # fields are deliberately ignored here (Job B's whole question is
      # "does the authors' latest still match what we verified"); the same
      # pack-name safety check and torch constraints apply.
      - name: Install manifest custom nodes at HEAD
        shell: bash
        run: |
          set -euo pipefail
          pip freeze | grep -iE '^(torch|torchvision|torchaudio)==' \
            > /tmp/torch-constraints.txt || true
          manifest=browser_tests/fixtures/data/customNodeManifest.json
          mapfile -t entries < <(jq -c '.[]' "$manifest")
          for entry in "${entries[@]}"; do
            repo=$(jq -r '.repo' <<<"$entry")
            pack=$(jq -r '.pack' <<<"$entry")
            if ! [[ "$pack" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
              echo "::error::unsafe pack name: '$pack'"; exit 1
            fi
            dir="ComfyUI/custom_nodes/$pack"
            echo "::group::install $pack @ HEAD"
            git clone --depth 1 "$repo" "$dir"
            git -C "$dir" log -1 --format='%H %s'
            if [ -f "$dir/requirements.txt" ]; then
              pip install -r "$dir/requirements.txt" -c /tmp/torch-constraints.txt
            fi
            echo "::endgroup::"
          done

      - name: Stage run-tier assets
        shell: bash
        run: cp browser_tests/assets/plain_video.mp4 ComfyUI/input/plain_video.mp4

      - name: Start ComfyUI server
        shell: bash
        working-directory: ComfyUI
        run: |
          python main.py --cpu --multi-user --cache-none --front-end-root ../dist &
          wait-for-it --service 127.0.0.1:8188 -t 600

      - name: Run custom-node suite
        # Step timeout below the job ceiling: an overlong run fails HERE
        # (keeping failure() true for the filing step) instead of tripping
        # the job-level cancel.
        timeout-minutes: 75
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: custom-nodes-results.json
        run: |
          pnpm exec playwright test browser_tests/tests/customNodes/ \
            --project=custom-nodes --reporter=list,json,html --workers=1

      - name: Forbid skipped tests
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          skipped=$(jq '.stats.skipped' custom-nodes-results.json)
          echo "skipped tests: $skipped"
          if [ "$skipped" != "0" ]; then
            echo "::error::$skipped test(s) skipped - a pack HEAD or devtools failed to load"
            jq -r '.. | objects
                     | select(has("title") and has("tests"))
                     | select(any(.tests[]?; .status == "skipped"))
                     | .title' custom-nodes-results.json | sort -u | head -40
            exit 1
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-custom-nodes-canary-packs
          path: playwright-report/
          retention-days: 7
          if-no-files-found: warn

      # cancelled() included for the same reason as Job A.
      - name: File drift issue on failure
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body="Nightly custom-nodes canary (core pinned, packs at HEAD) went red or was cancelled mid-run: $run_url
          A red here means the authors' latest packs diverge from what we verified - expected whenever our pins lag. Triage by a human: crashes or execution failures likely mean a pack author broke something (a maintainer should report it on the pack's repo); count or membership drift alone means our pins are stale (bump pins and recalibrate browser_tests/fixtures/data/customNodeManifest.json per browser_tests/tests/customNodes/ADDING_CUSTOM_NODES.md). A geometry delta under the mount test title means the pack's latest moved node layout - same bump-and-re-record path. Failure detail: download the playwright-report-custom-nodes-canary-packs artifact from the run."
          existing=$(gh issue list --repo "${{ github.repository }}" \
            --label custom-nodes-canary-packs --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "$body"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "Custom-nodes canary: pack drift" \
              --label custom-nodes-canary-packs \
              --body "$body"
          fi
