name: 'CI: Website E2E'

on:
  push:
    branches: [main, website/*]
    paths:
      - 'apps/website/**'
      - 'packages/design-system/**'
      - 'packages/tailwind-utils/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches-ignore: [wip/*, draft/*, temp/*]
    paths:
      - 'apps/website/**'
      - 'packages/design-system/**'
      - 'packages/tailwind-utils/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  website-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Post starting comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- WEBSITE_E2E_STATUS -->'
            const body = `${marker}\n## 🌐 Website E2E: ⏳ Running...`
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number
            })
            const existing = comments.find(c => c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body })
            }

      - name: Setup frontend
        uses: ./.github/actions/setup-frontend

      - name: Install Playwright browsers
        run: pnpm --filter @comfyorg/website exec playwright install --with-deps chromium

      - name: Build website
        run: pnpm --filter @comfyorg/website build

      - name: Run Playwright tests
        id: tests
        run: pnpm --filter @comfyorg/website test:e2e

      - name: Upload test report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: website-playwright-report
          path: apps/website/playwright-report/
          retention-days: 30

      - name: Deploy report to Cloudflare
        id: deploy
        if: always() && !cancelled()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          BRANCH=$(echo "${{ github.head_ref || github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g;s/--*/-/g;s/^-\|-$//g')
          npx wrangler@^4.0.0 pages project create comfyui-website-e2e --production-branch=main 2>/dev/null || true
          for i in 1 2 3; do
            echo "Deployment attempt $i of 3..."
            OUTPUT=$(npx wrangler@^4.0.0 pages deploy apps/website/playwright-report \
              --project-name=comfyui-website-e2e \
              --branch="$BRANCH" 2>&1) && break || echo "$OUTPUT"
            [ $i -lt 3 ] && sleep 10
          done
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.pages\.dev\S*' | head -1)
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Post result comment and summary
        if: always() && !cancelled()
        uses: actions/github-script@v8
        with:
          script: |
            const passed = '${{ steps.tests.outcome }}' === 'success'
            const status = passed ? '✅ Passed' : '❌ Failed'
            const reportUrl = '${{ steps.deploy.outputs.url }}'
            const link = reportUrl ? ` — [View Report](${reportUrl})` : ''
            const summary = `## 🌐 Website E2E: ${status}${link}`

            await core.summary.addRaw(summary).write()

            if (context.eventName === 'pull_request' && !context.payload.pull_request.head.repo.fork) {
              const marker = '<!-- WEBSITE_E2E_STATUS -->'
              const body = `${marker}\n${summary}`
              const { data: comments } = await github.rest.issues.listComments({
                ...context.repo,
                issue_number: context.issue.number
              })
              const existing = comments.find(c => c.body.includes(marker))
              if (existing) {
                await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body })
              } else {
                await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body })
              }
            }
