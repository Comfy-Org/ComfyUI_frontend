# Description: Fallow codebase audit in warn-only mode. Surfaces dead code,
# duplication, complexity hotspots, and boundary violations as PR annotations.
# Never fails the build — treat signal as guidance, not a gate.
name: 'CI: Fallow Audit'

on:
  pull_request:
    paths-ignore: ['**/*.md']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fallow-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    # Skip for work-in-progress / draft / temp source branches
    if: >-
      !startsWith(github.head_ref, 'wip/') &&
      !startsWith(github.head_ref, 'draft/') &&
      !startsWith(github.head_ref, 'temp/')
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup frontend
        uses: ./.github/actions/setup-frontend

      - name: Run fallow audit (warn-only)
        uses: fallow-rs/fallow@v2
        with:
          command: audit
          format: annotations
          config: .fallowrc.json
          auto-changed-since: 'true'
          fail-on-issues: 'false'
          annotations: 'true'
          max-annotations: '50'
        continue-on-error: true
