name: Release NPM Workflow Validation

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string
      dist_tag:
        description: 'npm dist-tag to use'
        required: true
        default: latest
        type: string
      ref:
        description: 'Git ref to checkout (commit SHA, tag, or branch)'
        required: false
        type: string

concurrency:
  group: publish-workflow-validation-${{ github.workflow }}-${{ inputs.version }}-${{ inputs.dist_tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @comfyorg/workflow-validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          SEMVER_REGEX='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'
          if [[ ! "$VERSION" =~ $SEMVER_REGEX ]]; then
            echo "::error title=Invalid version::Version '$VERSION' must follow semver" >&2
            exit 1
          fi

      - name: Determine ref to checkout
        id: resolve_ref
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ inputs.ref }}"
          if [ -n "$REF" ]; then
            if ! git check-ref-format --allow-onelevel "$REF"; then
              echo "::error title=Invalid ref::Ref '$REF' fails git check-ref-format validation." >&2
              exit 1
            fi
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
          else
            echo "ref=" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve_ref.outputs.ref }}
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Sync package version
        working-directory: packages/workflow-validation
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${{ inputs.version }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"

      - name: Build package
        working-directory: packages/workflow-validation
        run: pnpm run build

      - name: Verify dist
        working-directory: packages/workflow-validation/dist
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if [ "$VER" != "${{ inputs.version }}" ]; then
            echo "Error: dist package version $VER != ${{ inputs.version }}" >&2
            exit 1
          fi
          echo "Will publish ${NAME}@${VER}"

      - name: Check if version already on npm
        id: check_npm
        working-directory: packages/workflow-validation/dist
        shell: bash
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./package.json').name")
          VER="${{ inputs.version }}"
          STATUS=0
          OUTPUT=$(npm view "${NAME}@${VER}" --json 2>&1) || STATUS=$?
          if [ "$STATUS" -eq 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::warning title=Already published::${NAME}@${VER} already exists. Skipping."
          else
            if echo "$OUTPUT" | grep -q "E404"; then
              echo "exists=false" >> "$GITHUB_OUTPUT"
            else
              echo "::error title=Registry lookup failed::$OUTPUT" >&2
              exit "$STATUS"
            fi
          fi

      - name: Publish package
        if: steps.check_npm.outputs.exists == 'false'
        run: pnpm publish --access public --tag "${{ inputs.dist_tag }}" --no-git-checks
        working-directory: packages/workflow-validation/dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
