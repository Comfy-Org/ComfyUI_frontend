# Description: Team-gated multi-model Cursor review — a thin caller for the
# reusable workflow in Comfy-Org/github-workflows, which is the single source of
# truth for the panel, judge, prompts, and scripts. Triggered by the
# 'cursor-review' label.
#
# Access control (team-only, two layers):
#   1. Only users with triage permission or higher can apply a label in a public
#      repo, so the public cannot trigger this.
#   2. The reusable workflow's secret-bearing jobs do not run on fork PRs (forks
#      get no secrets), so CURSOR_API_KEY is reachable only on internal branches.
name: 'PR: Cursor Review'

on:
  pull_request:
    types: [labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

concurrency:
  # Re-labeling cancels an in-flight run for the same PR + label.
  group: cursor-review-pr-${{ github.event.pull_request.number }}-${{ github.event.label.name }}
  cancel-in-progress: true

jobs:
  cursor-review:
    if: github.event.action == 'labeled' && github.event.label.name == 'cursor-review'
    # Pinned to github-workflows main HEAD: the reusable cursor-review workflow
    # postdates the v1 tag, so there is no tagged release to pin to yet.
    uses: Comfy-Org/github-workflows/.github/workflows/cursor-review.yml@41d1201821487c80b7752c5a692a53ca0396066b # main
    with:
      # Judge on Opus 4.8. The panel's Opus leg is fixed in the reusable matrix at
      # the pinned SHA; once Comfy-Org/github-workflows#9 merges, bump the two SHAs
      # here to pick up the 4.8 panel leg and drop this override (it will then
      # match the new reusable default).
      judge_model: claude-opus-4-8-thinking-xhigh
      # Overriding replaces the reusable default wholesale, so this restates the
      # generated/vendored defaults and adds this repo's heavy paths (Playwright
      # snapshots, generated manager types).
      diff_excludes: >-
        :!**/package-lock.json
        :!**/yarn.lock
        :!**/pnpm-lock.yaml
        :!**/node_modules/**
        :!**/.claude/**
        :!**/dist/**
        :!**/vendor/**
        :!**/*.generated.*
        :!**/*.min.js
        :!**/*.min.css
        :!**/*-snapshots/**
        :!src/workbench/extensions/manager/types/generatedManagerTypes.ts
      # Load the prompts/scripts from the same ref as `uses:`.
      workflows_ref: 41d1201821487c80b7752c5a692a53ca0396066b
    secrets:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      # Optional — enables start/complete Slack DMs to the triggerer.
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
