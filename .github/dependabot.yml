version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
    groups:
      vue:
        patterns:
          - 'vue*'
          - '@vue/*'
          - '@vueuse/*'
        update-types:
          - 'minor'
          - 'patch'
      vite-vitest:
        patterns:
          - 'vite*'
          - '@vitejs/*'
          - 'vitest*'
          - '@vitest/*'
        update-types:
          - 'minor'
          - 'patch'
      eslint:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
        update-types:
          - 'minor'
          - 'patch'
      types:
        patterns:
          - '@types/*'
        update-types:
          - 'minor'
          - 'patch'
      storybook:
        patterns:
          - 'storybook*'
          - '@storybook/*'
        update-types:
          - 'minor'
          - 'patch'
      production-dependencies:
        dependency-type: 'production'
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      development-dependencies:
        dependency-type: 'development'
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # 20.10.x throws a sync NotSupportedError on external <script> append,
      # breaking GTM/Typeform loader tests (see #13733).
      - dependency-name: 'happy-dom'
        versions: ['>=20.10.0']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
      - 'github-actions'
    groups:
      github-actions:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
