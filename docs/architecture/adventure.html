<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComfyUI Frontend — Architecture Adventure</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f6feb33;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Header / HUD --- */
    #hud {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    #hud h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    #hud-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #stat-bars {
      display: flex;
      gap: 14px;
      font-size: 10px;
    }

    .stat-bar-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-bar-label { color: var(--muted); white-space: nowrap; }

    .stat-bar {
      width: 60px;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .stat-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease, background-color 0.4s ease;
    }

    .stat-bar-value {
      color: var(--text);
      font-weight: 600;
      min-width: 20px;
      text-align: right;
    }

    .stat-debt .stat-bar-fill { background: var(--red); }
    .stat-quality .stat-bar-fill { background: var(--green); }
    .stat-morale .stat-bar-fill { background: var(--yellow); }
    .stat-migration .stat-bar-fill { background: var(--purple); }

    /* --- Map Panel --- */
    #map-panel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: none;
    }

    #map-panel.open { display: block; }

    #map {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      max-width: 900px;
    }

    .map-room {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .map-room:hover { border-color: var(--accent); background: var(--accent-dim); }
    .map-room.visited { border-color: var(--green); opacity: 0.7; }
    .map-room.current { border-color: var(--accent); background: var(--accent-dim); }
    .map-room .room-layer { color: var(--muted); font-size: 9px; text-transform: uppercase; }
    .map-room .challenge-badge {
      display: inline-block;
      font-size: 8px;
      padding: 1px 4px;
      border-radius: 3px;
      margin-left: 4px;
    }

    .map-room .challenge-badge.pending { background: var(--yellow); color: var(--bg); }
    .map-room .challenge-badge.done { background: var(--green); color: var(--bg); }

    /* --- Main Content --- */
    #main {
      flex: 1;
      display: flex;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
      gap: 24px;
    }

    /* --- Narrative Column --- */
    #narrative {
      flex: 2;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #room-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    #room-header h2 {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 4px;
    }

    #room-layer {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* --- Room Image --- */
    .room-image {
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .room-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .room-image.placeholder {
      background: linear-gradient(135deg, #1a1e2e 0%, #0d1117 50%, #161b22 100%);
      border-style: dashed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      font-style: italic;
    }

    #room-description {
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
    }

    #room-description code {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--accent);
      font-size: 13px;
    }

    /* --- Challenge Panel --- */
    #challenge-panel {
      border: 2px solid var(--yellow);
      border-radius: 10px;
      overflow: hidden;
      display: none;
      animation: fadeSlideIn 0.3s ease;
    }

    #challenge-panel.active { display: block; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #challenge-header {
      background: rgba(210, 153, 34, 0.1);
      padding: 12px 16px;
      border-bottom: 1px solid var(--yellow);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #challenge-header .icon { font-size: 16px; }

    #challenge-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--yellow);
    }

    #challenge-desc {
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    #challenge-desc code {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--accent);
      font-size: 12px;
    }

    #challenge-choices {
      padding: 8px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .challenge-choice-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .challenge-choice-btn:hover {
      border-color: var(--yellow);
      background: rgba(210, 153, 34, 0.08);
    }

    .challenge-choice-btn .choice-key {
      background: var(--yellow);
      color: var(--bg);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      min-width: 24px;
      text-align: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .challenge-choice-btn .choice-text { flex: 1; }
    .challenge-choice-btn .choice-label { display: block; }
    .challenge-choice-btn .choice-hint { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* --- Result Banner --- */
    #result-banner {
      border-radius: 8px;
      padding: 12px 16px;
      display: none;
      animation: fadeSlideIn 0.3s ease;
      font-size: 13px;
      line-height: 1.5;
    }

    #result-banner.active { display: block; }
    #result-banner.good { border: 1px solid var(--green); background: rgba(63, 185, 80, 0.08); color: var(--green); }
    #result-banner.ok { border: 1px solid var(--yellow); background: rgba(210, 153, 34, 0.08); color: var(--yellow); }
    #result-banner.bad { border: 1px solid var(--red); background: rgba(248, 81, 73, 0.08); color: var(--red); }

    .stat-delta { font-weight: 600; font-size: 11px; }
    .stat-delta.positive { color: var(--green); }
    .stat-delta.negative { color: var(--red); }

    /* --- Artifacts / Items --- */
    #artifacts {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: none;
    }

    #artifacts.has-items { display: block; }

    #artifacts-header {
      background: var(--surface);
      padding: 8px 12px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
    }

    .artifact {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .artifact:last-child { border-bottom: none; }
    .artifact-name { color: var(--yellow); }
    .artifact-type { font-size: 10px; color: var(--muted); text-transform: uppercase; }

    /* --- Navigation Choices --- */
    #choices {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .choice-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .choice-btn:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .choice-btn .choice-key {
      background: var(--border);
      color: var(--text);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      min-width: 24px;
      text-align: center;
    }

    .choice-btn .choice-label { flex: 1; }
    .choice-btn .choice-hint { font-size: 11px; color: var(--muted); }

    /* --- Sidebar: Inventory / Log --- */
    #sidebar {
      flex: 1;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sidebar-section {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .sidebar-header {
      background: var(--surface);
      padding: 8px 12px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    .sidebar-body {
      padding: 8px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 12px;
    }

    .log-entry {
      padding: 4px 6px;
      border-radius: 4px;
      color: var(--muted);
      line-height: 1.5;
    }

    .log-entry.discovery { color: var(--green); }
    .log-entry.warning { color: var(--yellow); }
    .log-entry.error { color: var(--red); }
    .log-entry.ending { color: var(--purple); }

    .inv-item {
      padding: 6px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .inv-item-name { color: var(--yellow); font-size: 12px; }
    .inv-item-desc { color: var(--muted); font-size: 10px; }

    /* --- Ending Screen --- */
    #ending-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.5s ease;
    }

    #ending-overlay.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #ending-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      max-width: 560px;
      width: 90%;
      text-align: center;
      animation: scaleIn 0.4s ease 0.2s both;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    #ending-card .ending-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    #ending-card h2 {
      font-size: 22px;
      margin-bottom: 16px;
    }

    #ending-card .ending-desc {
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 24px;
    }

    #ending-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
      text-align: left;
    }

    .ending-stat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .ending-stat .label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
    .ending-stat .value { font-size: 18px; font-weight: 700; margin-top: 2px; }

    #play-again-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #play-again-btn:hover { opacity: 0.85; }

    /* --- Utilities --- */
    #toggle-map {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }

    #toggle-map:hover { border-color: var(--accent); color: var(--accent); }

    /* --- Responsive --- */
    @media (max-width: 900px) {
      #stat-bars { flex-wrap: wrap; gap: 8px; }
      .stat-bar { width: 40px; }
    }

    @media (max-width: 768px) {
      #main { flex-direction: column; padding: 16px; }
      #sidebar { min-width: unset; }
      #stat-bars { gap: 6px; }
    }
  </style>
</head>
<body>

  <!-- HUD -->
  <header id="hud">
    <h1>CODEBASE CAVERNS</h1>
    <div id="hud-right">
      <div id="stat-bars">
        <div class="stat-bar-group stat-debt">
          <span class="stat-bar-label">Debt</span>
          <div class="stat-bar"><div class="stat-bar-fill" id="bar-debt"></div></div>
          <span class="stat-bar-value" id="val-debt">50</span>
        </div>
        <div class="stat-bar-group stat-quality">
          <span class="stat-bar-label">Quality</span>
          <div class="stat-bar"><div class="stat-bar-fill" id="bar-quality"></div></div>
          <span class="stat-bar-value" id="val-quality">30</span>
        </div>
        <div class="stat-bar-group stat-morale">
          <span class="stat-bar-label">Morale</span>
          <div class="stat-bar"><div class="stat-bar-fill" id="bar-morale"></div></div>
          <span class="stat-bar-value" id="val-morale">60</span>
        </div>
        <div class="stat-bar-group stat-migration">
          <span class="stat-bar-label">ECS</span>
          <div class="stat-bar"><div class="stat-bar-fill" id="bar-migration"></div></div>
          <span class="stat-bar-value" id="val-migration">0/5</span>
        </div>
      </div>
      <button id="toggle-map">Map [M]</button>
    </div>
  </header>

  <!-- Collapsible Map -->
  <section id="map-panel">
    <div id="map"></div>
  </section>

  <!-- Main Layout -->
  <div id="main">

    <!-- Narrative -->
    <section id="narrative">
      <div id="room-header">
        <div id="room-layer"></div>
        <h2 id="room-title">Loading...</h2>
      </div>
      <div id="room-image" class="room-image" style="display:none"></div>
      <div id="room-description"></div>
      <div id="challenge-panel">
        <div id="challenge-header">
          <span class="icon">&#9888;</span>
          <span id="challenge-title"></span>
        </div>
        <div id="challenge-desc"></div>
        <div id="challenge-choices"></div>
      </div>
      <div id="result-banner"></div>
      <div id="artifacts">
        <div id="artifacts-header">Artifacts in this room</div>
        <div id="artifacts-list"></div>
      </div>
      <div id="choices"></div>
    </section>

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-header">
          <span>Inventory</span>
          <span id="inv-count">0</span>
        </div>
        <div class="sidebar-body" id="inventory">
          <div class="log-entry" style="color:var(--muted)">Empty &mdash; explore to find artifacts.</div>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-header">
          <span>Log</span>
          <span id="log-count">0</span>
        </div>
        <div class="sidebar-body" id="log"></div>
      </div>
    </aside>

  </div>

  <!-- Ending Overlay -->
  <div id="ending-overlay">
    <div id="ending-card">
      <div class="ending-label">Adventure Complete</div>
      <h2 id="ending-title"></h2>
      <div class="ending-desc" id="ending-desc"></div>
      <div id="ending-stats"></div>
      <button id="play-again-btn">Play Again</button>
    </div>
  </div>

  <script>
    // =============================================
    // Game Engine
    // =============================================

    function createInitialState() {
      return {
        currentRoom: 'entry',
        visited: new Set(),
        inventory: [],
        log: [],
        stats: { techDebt: 50, quality: 30, morale: 60, migrationProgress: 0 },
        challengesCompleted: new Set(),
        endingShown: false,
      }
    }

    let state = createInitialState()

    const TOTAL_CHALLENGES = 7

    // --- Image prompts per room ---
    // Image generation prompts per room (also exported as adventure-image-prompts.json)
    const imagePrompts = {
      entry: 'Pixel art of a glowing terminal in a vast dark server room, Vue.js and TypeScript logos floating as holographic projections, three corridors branching ahead lit by blue, green, and purple lights',
      components: 'Pixel art gallery hall with framed Vue component cards hung on stone walls, a massive canvas painting labeled "GraphView" in the center, smaller panels flanking either side, warm torchlight',
      stores: 'Pixel art underground vault with 60 glowing vault doors lining the walls, three doors in front glow brightest (labeled widget, layout, promotion), a Pinia pineapple emblem etched in stone above',
      services: 'Pixel art clean corridors with labeled pipes connecting rooms overhead, data flowing as glowing particles through transparent tubes, service names etched on brass plaques',
      litegraph: 'Pixel art dark engine room with three massive monolith machines labeled 9100, 4300, and 3100 lines of code, warning lights flashing amber, tangled wires and cables everywhere',
      ecs: "Pixel art architect's drafting room with blueprints pinned to walls showing entity-component diagrams, a glowing World orb floating in the center, branded ID cards scattered across the desk",
      renderer: 'Pixel art observation deck overlooking a vast canvas being painted by precise robotic arms, Y.js CRDT symbols floating in the air, a QuadTree grid visible on the floor below',
      composables: 'Pixel art workshop with hooks hanging from a pegboard wall, each labeled (useCoreCommands, useCanvasDrop, etc.), workbenches for auth, canvas, and queue domains, cozy lantern light',
      sidepanel: 'Pixel art multi-tabbed control panel glowing in the dark, a node browser search bar at top, properties inspector in the middle, model catalog below, all connected by wires to vault doors',
    }

    // --- Room Definitions ---
    const rooms = {
      entry: {
        title: 'The Entry Point',
        layer: 'src/main.ts',
        description: `
          You stand at <code>src/main.ts</code>, the entry point of the ComfyUI frontend.
          The air hums with the bootstrapping of a Vue 3 application. Pinia stores
          initialize around you, the router unfurls paths into the distance, and
          i18n translations whisper in dozens of languages.<br><br>
          Three corridors stretch ahead, each leading deeper into the architecture.
          Somewhere in this codebase, god objects lurk, mutations scatter in the shadows,
          and a grand migration awaits your decisions.
        `,
        artifacts: [],
        choices: [
          { key: '1', label: 'Enter the Component Gallery', hint: 'Presentation Layer', room: 'components' },
          { key: '2', label: 'Descend into the Store Vaults', hint: 'State Management', room: 'stores' },
          { key: '3', label: 'Follow the wires to Services', hint: 'Business Logic', room: 'services' },
        ],
      },

      components: {
        title: 'The Component Gallery',
        layer: 'Presentation',
        description: `
          Vast halls lined with Vue Single File Components. <code>GraphView.vue</code>
          dominates the center &mdash; the main canvas workspace where nodes are wired together.
          To one side, <code>LinearView.vue</code> offers an alternative perspective.<br><br>
          Panels flank the walls: the right side panel houses the node browser and properties;
          the bottom panel shows queues and console output.
        `,
        artifacts: [
          { name: 'GraphView.vue', type: 'Component' },
        ],
        challenge: {
          title: 'The Circular Dependency',
          description: `
            A tangled knot blocks the corridor ahead. <code>Subgraph</code> extends <code>LGraph</code>,
            but <code>LGraph</code> creates and manages Subgraph instances. The circular import
            forces order-dependent barrel exports and makes testing impossible in isolation.<br><br>
            How do you untangle it?
          `,
          choices: [
            {
              key: 'A', label: 'Composition over inheritance',
              hint: 'Subgraph HAS a graph, not IS a graph. ECS eliminates class inheritance entirely.',
              effects: { techDebt: -10, quality: 15, morale: 5, migrationProgress: 1 },
              rating: 'good',
              feedback: 'The circular dependency dissolves. Subgraph becomes a thin wrapper holding a graph reference. Components replace inheritance.',
            },
            {
              key: 'B', label: 'Barrel file reordering',
              hint: 'Rearrange exports so the cycle resolves at module load time.',
              effects: { techDebt: 10, quality: -5, morale: -5 },
              rating: 'bad',
              feedback: 'The imports stop crashing... for now. But the underlying coupling remains, and any new file touching both classes risks reviving the cycle.',
            },
            {
              key: 'C', label: 'Factory injection',
              hint: 'Pass a graph factory function to break the static import cycle.',
              effects: { techDebt: -5, quality: 10 },
              rating: 'ok',
              feedback: 'The factory breaks the import cycle cleanly. It\'s a pragmatic fix, though the classes remain tightly coupled at runtime.',
            },
          ],
        },
        choices: [
          { key: '1', label: 'Inspect the Canvas', hint: 'Litegraph Engine', room: 'litegraph' },
          { key: '2', label: 'Open the Right Side Panel', hint: 'Node Browser & Properties', room: 'sidepanel' },
          { key: '3', label: 'Return to the Entry Point', hint: 'src/main.ts', room: 'entry' },
        ],
      },

      stores: {
        title: 'The Store Vaults',
        layer: 'State',
        description: `
          Sixty Pinia stores line the walls like vault doors, each guarding a domain of reactive state.
          The proto-ECS stores glow brightest &mdash; <code>widgetValueStore</code>,
          <code>layoutStore</code>, and <code>promotionStore</code> &mdash; bridging the old
          litegraph world with a modern ECS future.<br><br>

    // --- Stats ---
    function clamp(val, min, max) {
      return Math.max(min, Math.min(max, val))
    }

    function applyEffects(effects) {
      if (!effects) return
      const s = state.stats
      if (effects.techDebt) s.techDebt = clamp(s.techDebt + effects.techDebt, 0, 100)
      if (effects.quality) s.quality = clamp(s.quality + effects.quality, 0, 100)
      if (effects.morale) s.morale = clamp(s.morale + effects.morale, 0, 100)
      if (effects.migrationProgress) s.migrationProgress = clamp(s.migrationProgress + effects.migrationProgress, 0, 5)
      renderStats()
    }

    function renderStats() {
      const s = state.stats
      els.barDebt.style.width = s.techDebt + '%'
      els.barQuality.style.width = s.quality + '%'
      els.barMorale.style.width = s.morale + '%'
      els.barMigration.style.width = (s.migrationProgress / 5 * 100) + '%'
      els.valDebt.textContent = s.techDebt
      els.valQuality.textContent = s.quality
      els.valMorale.textContent = s.morale
      els.valMigration.textContent = s.migrationProgress + '/5'
    }

    function formatEffects(effects) {
      const labels = { techDebt: 'Debt', quality: 'Quality', morale: 'Morale', migrationProgress: 'ECS' }
      return Object.entries(effects)
        .filter(([, v]) => v !== 0 && v !== undefined)
        .map(([k, v]) => {
          const sign = v > 0 ? '+' : ''
          const cls = (k === 'techDebt' ? (v < 0 ? 'positive' : 'negative') : (v > 0 ? 'positive' : 'negative'))
          return `<span class="stat-delta ${cls}">${labels[k]} ${sign}${v}</span>`
        })
        .join(' &nbsp; ')
    }

    // --- Rendering ---
    function render(roomId) {
      const room = rooms[roomId]
      if (!room) return

      state.currentRoom = roomId
      state.visited.add(roomId)

      // Header
      els.roomTitle.textContent = room.title
      els.roomLayer.textContent = room.layer

      // Room image
      const prompt = imagePrompts[roomId]
      els.roomImage.style.display = ''
      els.roomImage.classList.remove('placeholder')
      const img = new Image()
      img.src = `images/${roomId}.png`
      img.alt = prompt || room.title
      img.onload = () => {
        els.roomImage.innerHTML = ''
        els.roomImage.appendChild(img)
      }
      img.onerror = () => {
        if (prompt) {
          els.roomImage.classList.add('placeholder')
          els.roomImage.innerHTML = `<span>${prompt}</span>`
        } else {
          els.roomImage.style.display = 'none'
        }
      }

      // Description
      els.roomDesc.innerHTML = room.description.trim()

      // Artifacts in room
      if (room.artifacts && room.artifacts.length > 0) {
        els.artifacts.classList.add('has-items')
        els.artifactsList.innerHTML = room.artifacts.map(a => `
          <div class="artifact">
            <span class="artifact-name">${a.name}</span>
            <span class="artifact-type">${a.type}</span>
          </div>
        `).join('')

        for (const a of room.artifacts) {
          if (!state.inventory.find(i => i.name === a.name)) {
            state.inventory.push(a)
            addLog(`Collected: ${a.name}`, 'discovery')
          }
        }
      } else {
        els.artifacts.classList.remove('has-items')
        els.artifactsList.innerHTML = ''
      }

      // Challenge or navigation
      const hasUnresolvedChallenge = room.challenge && !state.challengesCompleted.has(roomId)

      if (hasUnresolvedChallenge) {
        showChallenge(roomId, room.challenge)
      } else {
        hideChallenge()
      }
      renderChoices(room.choices)

      // Clear result banner on room change
      els.resultBanner.classList.remove('active')

      // Update HUD
      renderStats()
      renderInventory()
      renderMap()

      addLog(`Entered: ${room.title}`)
    }

    function showChallenge(roomId, challenge) {
      els.challengePanel.classList.add('active')
      els.challengeTitle.textContent = challenge.title
      els.challengeDesc.innerHTML = challenge.description.trim()

      els.challengeChoices.innerHTML = challenge.choices.map(c => `
        <button class="challenge-choice-btn" data-key="${c.key}">
          <span class="choice-key">${c.key}</span>
          <div class="choice-text">
            <span class="choice-label">${c.label}</span>
            <span class="choice-hint">${c.hint}</span>
          </div>
        </button>
      `).join('')

      els.challengeChoices.querySelectorAll('.challenge-choice-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.key
          resolveChallenge(roomId, key)
        })
      })
    }

    function hideChallenge() {
      els.challengePanel.classList.remove('active')
    }

    function resolveChallenge(roomId, choiceKey) {
      const room = rooms[roomId]
      const challenge = room.challenge
      const choice = challenge.choices.find(c => c.key === choiceKey)
      if (!choice) return

      state.challengesCompleted.add(roomId)

      // Apply effects
      applyEffects(choice.effects)

      // Hide challenge, show result
      hideChallenge()

      els.resultBanner.className = 'active ' + choice.rating
      els.resultBanner.classList.add('active')
      els.resultBanner.innerHTML = `
        <strong>${choice.label}</strong><br>
        ${choice.feedback}<br><br>
        ${formatEffects(choice.effects)}
      `

      // Show navigation choices
      renderChoices(room.choices)

      // Log
      addLog(`Challenge resolved: ${challenge.title}`, choice.rating === 'good' ? 'discovery' : choice.rating === 'bad' ? 'error' : 'warning')

      // Check ending
      if (state.challengesCompleted.size >= TOTAL_CHALLENGES) {
        addLog('All challenges resolved. Your fate is sealed...', 'ending')
        setTimeout(showEnding, 1500)
      }

      renderMap()
    }

    function renderChoices(choices) {
      els.choices.innerHTML = choices.map(c => `
        <button class="choice-btn" data-room="${c.room}">
          <span class="choice-key">${c.key}</span>
          <span class="choice-label">${c.label}</span>
          <span class="choice-hint">${c.hint}</span>
        </button>
      `).join('')

      els.choices.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', () => render(btn.dataset.room))
      })
    }

    function renderInventory() {
      if (state.inventory.length > 0) {
        els.inventory.innerHTML = state.inventory.map(i => `
          <div class="inv-item">
            <span class="inv-item-name">${i.name}</span>
            <span class="inv-item-desc">${i.type}</span>
          </div>
        `).join('')
      }
      els.invCount.textContent = state.inventory.length
    }

    function addLog(message, type = '') {
      state.log.unshift({ message, type })
      els.log.innerHTML = state.log.map(l =>
        `<div class="log-entry ${l.type}">${l.message}</div>`

      els.logCount.textContent = state.log.length
    }

    function renderMap() {
      els.map.innerHTML = Object.entries(rooms).map(([id, room]) => {
        const classes = ['map-room']
        if (id === state.currentRoom) classes.push('current')
        else if (state.visited.has(id)) classes.push('visited')

        let badge = ''
        if (room.challenge) {
          if (state.challengesCompleted.has(id)) {
            badge = '<span class="challenge-badge done">&#10003;</span>'
          } else {
            badge = '<span class="challenge-badge pending">?</span>'
          }
        }

        return `
          <div class="${classes.join(' ')}" data-room="${id}">
            <div class="room-layer">${room.layer}${badge}</div>
            <div>${room.title}</div>
          </div>
        `
      }).join('')

      els.map.querySelectorAll('.map-room').forEach(el => {
        el.addEventListener('click', () => render(el.dataset.room))
      })
    }

    // --- Endings ---
    function showEnding() {
      if (state.endingShown) return
      state.endingShown = true

      const s = state.stats
      const ending = endings.find(e => e.test(s))

      els.endingTitle.textContent = ending.title
      els.endingTitle.style.color = `var(${ending.color})`
      els.endingDesc.innerHTML = ending.description

      const statColor = (label, val, good) => {
        const color = good ? 'var(--green)' : (label === 'Technical Debt' ? 'var(--red)' : 'var(--yellow)')
        return `<div class="ending-stat">
          <div class="label">${label}</div>
          <div class="value" style="color:${color}">${val}</div>
        </div>`
      }

      els.endingStats.innerHTML = [
        statColor('Technical Debt', s.techDebt, s.techDebt < 30),
        statColor('Code Quality', s.quality, s.quality >= 60),
        statColor('Team Morale', s.morale, s.morale >= 60),
        statColor('ECS Migration', s.migrationProgress + ' / 5', s.migrationProgress >= 4),
      ].join('')

      els.endingOverlay.classList.add('active')
    }

    // --- Reset ---
    function resetGame() {
      state = createInitialState()
      els.endingOverlay.classList.remove('active')
      els.resultBanner.classList.remove('active')
      els.resultBanner.className = ''
      render('entry')
      addLog('Welcome back, architect. The codebase awaits.', 'discovery')
    }

    // --- Map Toggle ---
    els.toggleMap.addEventListener('click', () => {
      els.mapPanel.classList.toggle('open')
    })

    els.playAgainBtn.addEventListener('click', resetGame)

    // --- Keyboard Navigation ---
    document.addEventListener('keydown', (e) => {
      if (state.endingShown) return

      if (e.key === 'm' || e.key === 'M') {
        els.mapPanel.classList.toggle('open')
        return
      }

      const room = rooms[state.currentRoom]
      if (!room) return

      // Check if challenge is active
      const hasUnresolvedChallenge = room.challenge && !state.challengesCompleted.has(state.currentRoom)
      if (hasUnresolvedChallenge && els.challengePanel.classList.contains('active')) {
        const choice = room.challenge.choices.find(c => c.key.toLowerCase() === e.key.toLowerCase())
        if (choice) resolveChallenge(state.currentRoom, choice.key)
        return
      }

      // Normal navigation
      const choice = room.choices.find(c => c.key === e.key)
      if (choice) render(choice.room)
    })

    // --- Boot ---
    render('entry')
    renderStats()
    addLog('Welcome, architect. Explore the codebase. Challenges await in every room.', 'discovery')
  </script>

</body>
</html>
